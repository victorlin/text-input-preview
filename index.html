<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
</head>

<body>

    <p>Paste some text in the input. It will be displayed in the preview.</p>

    <div style="display: flex; flex-wrap: wrap;">

        <div style="flex: 1 1 300px; padding-right: 1em">
            <p>Input</p>
            <textarea type="text" id="input" rows="10" style="width: 100%" autofocus></textarea>
        </div>

        <div style="flex: 1 1 300px;">
            <span>Preview</span>

            <select onchange="setFontFamily(this.value);">
                <option value="Times New Roman">Times New Roman</option>
                <option value="Arial">Arial</option>
                <option value="fantasy">Fantasy</option>
                <option value="cursive" elected="selected">cursive</option>
            </select>

            <label for="fontSize">Font size:</label>
            <input type="number" id="fontSize" min="10" max="40" value="30" onchange="setFontSize(this.value);" />

            <div id="preview" style="font-size: 30px; font-family: cursive;"></div>
        </div>

    </div>

    <script type="text/javascript">
        // https://javascript.info/events-change-input#event-input
        input.oninput = function () {
            preview.innerText = input.value;
        };

        // https://www.tutorialspoint.com/how-to-change-font-style-using-drop-down-list-in-javascript
        function setFontFamily(newFontFamily) {
            preview.style.fontFamily = newFontFamily;
        };

        function setFontSize(newFontSize) {
            preview.style.fontSize = newFontSize + "px";
        };
    </script>
</body>

</html>
